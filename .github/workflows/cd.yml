name: CD

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Raspberry Pi
    runs-on: [self-hosted, linux, arm64]
    steps:
      # Deploy from a persistent clone on the Pi that holds .env (secrets +
      # host config, never in git) and the models volume. Provision once:
      #   git clone <repo> ~/ignis && cp .env.example ~/ignis/.env (edit it)
      - name: Pull and deploy
        run: |
          cd ~/ignis
          git fetch origin main
          git reset --hard origin/main
          make deploy

