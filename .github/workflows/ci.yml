name: CI

on:
  push:
    branches: [develop]
  pull_request:
    branches: [develop, main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-test:
    name: Ruff + pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv venv --python 3.12

      - name: Install dev deps
        run: uv pip install -e ".[dev]"

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Pytest
        run: uv run pytest -q

  docker-build:
    name: Docker build (ingest + worker)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Build ha_ingest image
        run: docker build -t ignis-ingest -f Dockerfile .
      - name: Build worker image
        run: docker build -t ignis-worker -f Dockerfile.worker .
