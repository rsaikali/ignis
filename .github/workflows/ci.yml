name: CI

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-test:
    name: Ruff + pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv venv --python 3.12

      - name: Install dev + engine deps
        # engine brings psycopg/numpy that DB modules import at top level.
        run: uv pip install -e ".[dev,engine]"

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Pytest
        run: uv run pytest -q

  docker-build:
    name: Docker build (ingest + worker)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: docker/setup-buildx-action@v3
      # GHA layer cache: the heavy deps layer (tensorflow) is reused across runs,
      # so only a pyproject change rebuilds it.
      - name: Build ha_ingest image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          tags: ignis-ingest
          cache-from: type=gha,scope=ingest
          cache-to: type=gha,scope=ingest,mode=max
      - name: Build worker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.worker
          tags: ignis-worker
          cache-from: type=gha,scope=worker
          cache-to: type=gha,scope=worker,mode=max
